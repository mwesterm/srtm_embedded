name: Bump Version from Tag

on:
  push:
    # Nur auf Tags mit vX.X.X Triggern
    tags:
      - 'v[0-9]{1,2}.[0-9]{1,2}.[0-9]{1,2}'

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install git-cliff
      run: cargo install git-cliff

    - name: Set version from tag and generate changelog
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ github.ref_name }}
      run: |
        # Extrahiere Version ohne 'v' vorangestellt
        VERSION="${TAG#v}"

        # Setze Version in Cargo.toml
        sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

        # Generiere CHANGELOG.md
        git-cliff -o CHANGELOG.md

        # Commit CHANGELOG.md & Cargo.toml falls Änderungen
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        if git status --porcelain | grep -q .; then
          git add Cargo.toml CHANGELOG.md
          git commit -m "chore: update version to ${VERSION} and changelog"
          git push https://${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD
        else
          echo "No changes to commit."
        fi
